<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B22</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; font-size: 12px; overflow: hidden; }

  .wrapper {
    display: flex;
    height: 100vh;
  }

  /* Fake large scroll area */
  .scroll-area {
    overflow: auto;
    flex: 1;
  }

  /* This giant div creates the scrollbar range */
  .scroll-phantom {
    width: calc(80px * 16384); /* XFD columns */
    height: calc(24px * 1048576); /* max rows */
    position: relative;
  }

  /* Actual visible table sits on top, sticky */
  table {
    position: sticky;
    top: 0;
    left: 0;
    border-collapse: collapse;
    table-layout: fixed;
    background: white;
    z-index: 1;
  }

  th, td {
    border: 1px solid #ccc;
    width: 80px;
    min-width: 80px;
    height: 24px;
    padding: 0;
    text-align: center;
  }

  th {
    background: #f0f0f0;
    font-weight: normal;
  }

  td:first-child, th:first-child {
    background: #f0f0f0;
    width: 50px;
    min-width: 50px;
  }

  td input {
    width: 100%;
    height: 100%;
    border: none;
    outline: none;
    font-size: 12px;
    background: transparent;
    text-align: center;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="scroll-area" id="scrollArea">
    <div class="scroll-phantom">
      <table id="sheet"></table>
    </div>
  </div>
</div>

<script>
  const VISIBLE_COLS = 20;
  const VISIBLE_ROWS = 30;
  const CELL_W = 80;
  const CELL_H = 24;

  // Store all entered data
  const data = {};

  function colName(n) {
    let name = '';
    while (n >= 0) {
      name = String.fromCharCode(65 + (n % 26)) + name;
      n = Math.floor(n / 26) - 1;
    }
    return name;
  }

  // Build the visible table once
  const table = document.getElementById('sheet');
  const scrollArea = document.getElementById('scrollArea');

  // Track current scroll position in terms of row/col offset
  let rowOffset = 0;
  let colOffset = 0;

  function buildTable() {
    table.innerHTML = '';

    // Header
    const thead = document.createElement('thead');
    const hr = document.createElement('tr');
    const corner = document.createElement('th');
    corner.style.width = '50px';
    hr.appendChild(corner);
    for (let c = 0; c < VISIBLE_COLS; c++) {
      const th = document.createElement('th');
      th.textContent = colName(colOffset + c);
      hr.appendChild(th);
    }
    thead.appendChild(hr);
    table.appendChild(thead);

    // Body
    const tbody = document.createElement('tbody');
    for (let r = 0; r < VISIBLE_ROWS; r++) {
      const tr = document.createElement('tr');
      const rowLabel = document.createElement('td');
      rowLabel.textContent = rowOffset + r + 1;
      tr.appendChild(rowLabel);

      for (let c = 0; c < VISIBLE_COLS; c++) {
        const td = document.createElement('td');
        const input = document.createElement('input');
        const key = `${rowOffset + r},${colOffset + c}`;
        input.value = data[key] || '';
        input.addEventListener('input', (e) => {
          data[key] = e.target.value;
        });
        td.appendChild(input);
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
  }

  // On scroll, update row/col offset and re-render
  scrollArea.addEventListener('scroll', () => {
    const newRowOffset = Math.floor(scrollArea.scrollTop / CELL_H);
    const newColOffset = Math.floor(scrollArea.scrollLeft / CELL_W);

    if (newRowOffset !== rowOffset || newColOffset !== colOffset) {
      rowOffset = newRowOffset;
      colOffset = newColOffset;
      buildTable();
    }
  });

  buildTable();
</script>
</body>
</html>
