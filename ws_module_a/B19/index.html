<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B19</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        html {
            font-family: sans-serif;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        input {
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #000;
        }
        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: 0;
            background-color: royalblue;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <section>
        <h1>Password:</h1>
        <input type="password" name="pwd" id="pwd">
        <button onclick="toggle()">Show</button>
    </section>
    <script src="./script.js"></script>
</body>
</html>
